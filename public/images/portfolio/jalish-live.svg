<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0c0a"/>
      <stop offset="100%" style="stop-color:#1c1a14"/>
    </linearGradient>
    <linearGradient id="photoOverlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0c0a" stop-opacity="1"/>
      <stop offset="45%" style="stop-color:#1a1710" stop-opacity="0.85"/>
      <stop offset="100%" style="stop-color:#0d0c0a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8962e"/>
      <stop offset="50%" style="stop-color:#d4a83a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#a8861e"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#0d0c0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="750" fill="url(#darkBg)"/>

  <!-- Simulated photo area (right side — moody dark jewelry photo feel) -->
  <rect x="420" y="0" width="780" height="750" fill="#1a1610"/>
  <!-- Ring/jewelry photo simulation -->
  <ellipse cx="880" cy="420" rx="280" ry="220" fill="#2a2318" opacity="0.8"/>
  <ellipse cx="900" cy="430" rx="180" ry="140" fill="#332c1e" opacity="0.7"/>
  <!-- Simulated diamond ring shape -->
  <ellipse cx="880" cy="430" rx="90" ry="60" fill="none" stroke="#c9a84c" stroke-width="18" opacity="0.7"/>
  <ellipse cx="880" cy="370" rx="55" ry="40" fill="#d0c8b8" opacity="0.5"/>
  <ellipse cx="880" cy="370" rx="38" ry="28" fill="#e8e0d0" opacity="0.6"/>
  <!-- Diamond facets simulation -->
  <polygon points="880,345 910,370 880,395 850,370" fill="#f0ece4" opacity="0.5"/>
  <polygon points="880,345 910,370 880,358" fill="white" opacity="0.6"/>
  <polygon points="880,382 910,370 880,395" fill="#c8c0b0" opacity="0.4"/>
  <!-- Fabric texture suggestion -->
  <rect x="600" y="500" width="600" height="250" fill="#1a1610" opacity="0.6"/>

  <!-- Overlay gradient for text readability -->
  <rect width="1200" height="750" fill="url(#photoOverlay)"/>

  <!-- Glow behind ring -->
  <ellipse cx="880" cy="420" rx="320" ry="250" fill="url(#ringGlow)"/>

  <!-- Nav bar -->
  <rect width="1200" height="72" fill="rgba(10,9,7,0.92)"/>

  <!-- Jalish logo -->
  <!-- Diamond icon -->
  <polygon points="80,24 96,36 80,48 64,36" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <polygon points="80,28 90,36 80,44 70,36" fill="url(#goldGrad)" opacity="0.4"/>
  <text x="104" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="url(#goldGrad)" letter-spacing="1">Jalish</text>
  <text x="104" y="46" font-family="Georgia, serif" font-size="9" fill="rgba(201,168,76,0.7)" letter-spacing="1.5">FINE JEWELRY</text>
  <text x="104" y="58" font-family="Georgia, serif" font-size="8" fill="rgba(201,168,76,0.45)" letter-spacing="0.5">Refined Jewelry · Timeless Style</text>

  <!-- Nav links -->
  <text x="700" y="41" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">COLLECTIONS</text>
  <text x="840" y="41" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">BESPOKE</text>
  <text x="960" y="41" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">OUR STORY</text>
  <text x="1068" y="41" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">CONTACT</text>

  <!-- Book Consultation button -->
  <rect x="1130" y="22" width="40" height="0" fill="transparent"/>
  <rect x="1108" y="20" width="56" height="34" rx="0" fill="url(#goldBtn)"/>
  <!-- Wider button -->
  <rect x="1096" y="20" width="80" height="34" fill="url(#goldBtn)"/>
  <text x="1136" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1a1410" text-anchor="middle" letter-spacing="0.5">BOOK</text>

  <!-- Hack: proper book consultation label -->
  <rect x="1050" y="20" width="130" height="34" fill="url(#goldBtn)"/>
  <text x="1115" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#111008" text-anchor="middle" letter-spacing="1">BOOK CONSULTATION</text>

  <!-- "NEW COLLECTION 2026" badge -->
  <line x1="80" y1="175" x2="130" y2="175" stroke="rgba(201,168,76,0.7)" stroke-width="1"/>
  <text x="140" y="180" font-family="Arial, sans-serif" font-size="12" fill="rgba(201,168,76,0.9)" letter-spacing="3">NEW COLLECTION 2026</text>
  <line x1="390" y1="175" x2="440" y2="175" stroke="rgba(201,168,76,0.7)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="400" fill="white" letter-spacing="-2">Timeless</text>
  <!-- "Elegance" in gold italic -->
  <text x="80" y="378" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-style="italic" fill="url(#goldGrad)" letter-spacing="-2">Elegance</text>
  <text x="80" y="478" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="400" fill="white" letter-spacing="-2">Refined.</text>

  <!-- Sub text at bottom left -->
  <text x="80" y="540" font-family="Georgia, serif" font-size="15" fill="rgba(255,255,255,0.55)">Each piece is a story told in gold and light. Handcrafted with</text>
  <text x="80" y="562" font-family="Georgia, serif" font-size="15" fill="rgba(255,255,255,0.55)">passion, precision, and timeless artistry.</text>

  <!-- CTA -->
  <rect x="80" y="594" width="220" height="50" rx="0" fill="url(#goldBtn)"/>
  <text x="190" y="624" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111008" text-anchor="middle" letter-spacing="1">EXPLORE COLLECTION</text>

  <!-- WhatsApp bubble bottom right -->
  <circle cx="1150" cy="690" r="30" fill="#25d366"/>
  <text x="1150" y="698" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">💬</text>

  <!-- URL watermark -->
  <text x="600" y="736" font-family="Arial, sans-serif" font-size="11" fill="rgba(201,168,76,0.3)" text-anchor="middle" letter-spacing="1">jalish.manus.space</text>
</svg>
