  <text x="80" y="668" font-family="Arial, sans-serif" font-size="12" fill="#374151">"Fastest converter I've used."</text>
  <text x="80" y="688" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">— Sarah K., Designer</text>

  <rect x="440" y="620" width="320" height="80" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="648" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">★★★★★</text>
  <text x="460" y="668" font-family="Arial, sans-serif" font-size="12" fill="#374151">"No sign-up, just works perfectly."</text>
  <text x="460" y="688" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">— Mark T., Developer</text>

  <rect x="820" y="620" width="320" height="80" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="840" y="648" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">★★★★★</text>
  <text x="840" y="668" font-family="Arial, sans-serif" font-size="12" fill="#374151">"20+ tools, all free. Amazing!"</text>
  <text x="840" y="688" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">— Aisha M., Student</text>

  <text x="600" y="736" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">fileconvpro.manus.space</text>
