  <text x="600" y="540" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#111827" text-anchor="middle">20+</text>
  <text x="600" y="562" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Conversion Tools</text>
