<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb"/>
      <stop offset="100%" style="stop-color:#f3f4f6"/>
    </linearGradient>
    <linearGradient id="tealAcademy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgLight)"/>

  <!-- Nav bar -->
  <rect width="1200" height="60" fill="white"/>
  <rect width="1200" height="1" y="60" fill="#e5e7eb"/>

  <!-- Logo -->
  <rect x="40" y="14" width="34" height="34" rx="8" fill="url(#tealAcademy)"/>
  <!-- Document icon in logo -->
  <rect x="50" y="20" width="14" height="18" rx="2" fill="white" opacity="0.9"/>
  <line x1="53" y1="25" x2="61" y2="25" stroke="rgba(3,105,161,0.7)" stroke-width="1.5"/>
  <line x1="53" y1="29" x2="61" y2="29" stroke="rgba(3,105,161,0.7)" stroke-width="1.5"/>
  <line x1="53" y1="33" x2="58" y2="33" stroke="rgba(3,105,161,0.7)" stroke-width="1.5"/>
  <text x="84" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Viero Academy</text>
  <text x="84" y="47" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" letter-spacing="0.3">Clinical Document Engine</text>

  <!-- Nav links -->
  <text x="780" y="36" font-family="Arial, sans-serif" font-size="13" fill="#374151">How it works</text>
  <text x="900" y="36" font-family="Arial, sans-serif" font-size="13" fill="#374151">Templates</text>
  <text x="990" y="36" font-family="Arial, sans-serif" font-size="13" fill="#374151">Pricing</text>
  <rect x="1070" y="18" width="90" height="28" rx="6" fill="url(#tealAcademy)"/>
  <text x="1115" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Try Free</text>

  <!-- Hero -->
  <text x="600" y="125" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#111827" text-anchor="middle">AI-Powered</text>
  <text x="600" y="175" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#0369a1" text-anchor="middle">Clinical Document Engine</text>
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">Upload PDF or Word documents — AI extracts clinical structure</text>
  <text x="600" y="242" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">and generates professional, print-ready PDFs instantly</text>

  <!-- 3-Step workflow cards -->
  <!-- Step 1 -->
  <rect x="100" y="290" width="300" height="260" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Step badge -->
  <circle cx="150" cy="330" r="22" fill="url(#stepGrad1)"/>
  <text x="150" y="336" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#1e40af" text-anchor="middle">1</text>
  <!-- Upload icon -->
  <rect x="196" y="312" width="180" height="36" rx="18" fill="url(#stepGrad1)"/>
  <text x="286" y="336" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">Import Document</text>
  <!-- Document illustration -->
  <rect x="160" y="368" width="180" height="120" rx="10" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <rect x="180" y="386" width="140" height="10" rx="4" fill="#dbeafe"/>
  <rect x="180" y="404" width="120" height="8" rx="4" fill="#e0f2fe"/>
  <rect x="180" y="418" width="130" height="8" rx="4" fill="#e0f2fe"/>
  <rect x="180" y="432" width="110" height="8" rx="4" fill="#e0f2fe"/>
  <rect x="180" y="446" width="100" height="8" rx="4" fill="#dbeafe"/>
  <!-- Upload arrow -->
  <path d="M250,500 L250,470 M242,480 L250,470 L258,480" stroke="#0369a1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="250" y="528" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">PDF or Word file</text>

  <!-- Arrow between steps -->
  <path d="M410,420 L450,420" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="446,415 456,420 446,425" fill="#d1d5db"/>

  <!-- Step 2 -->
  <rect x="460" y="290" width="300" height="260" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="510" cy="330" r="22" fill="url(#stepGrad2)"/>
  <text x="510" y="336" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#065f46" text-anchor="middle">2</text>
  <rect x="556" y="312" width="180" height="36" rx="18" fill="url(#stepGrad2)"/>
  <text x="646" y="336" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#065f46" text-anchor="middle">Review &amp; Edit JSON</text>
  <!-- JSON editor mockup -->
  <rect x="520" y="368" width="180" height="120" rx="10" fill="#1e293b"/>
  <text x="536" y="390" font-family="monospace" font-size="9" fill="#60a5fa">&#123;</text>
  <text x="544" y="404" font-family="monospace" font-size="9" fill="#34d399">"patient":</text>
  <text x="620" y="404" font-family="monospace" font-size="9" fill="#fbbf24">"John D."</text>
  <text x="544" y="418" font-family="monospace" font-size="9" fill="#34d399">"diagnosis":</text>
  <text x="620" y="418" font-family="monospace" font-size="9" fill="#fbbf24">"..."</text>
  <text x="544" y="432" font-family="monospace" font-size="9" fill="#34d399">"treatment":</text>
  <text x="620" y="432" font-family="monospace" font-size="9" fill="#a78bfa">&#123;...&#125;</text>
  <text x="544" y="446" font-family="monospace" font-size="9" fill="#34d399">"date":</text>
  <text x="596" y="446" font-family="monospace" font-size="9" fill="#fbbf24">"2026"</text>
  <text x="536" y="460" font-family="monospace" font-size="9" fill="#60a5fa">&#125;</text>
  <text x="610" y="528" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">AI-extracted structure</text>

  <!-- Arrow between steps -->
  <path d="M770,420 L810,420" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="806,415 816,420 806,425" fill="#d1d5db"/>

  <!-- Step 3 -->
  <rect x="820" y="290" width="300" height="260" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="870" cy="330" r="22" fill="url(#stepGrad3)"/>
  <text x="870" y="336" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#4c1d95" text-anchor="middle">3</text>
  <rect x="916" y="312" width="180" height="36" rx="18" fill="url(#stepGrad3)"/>
  <text x="1006" y="336" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="middle">Download PDF</text>
  <!-- PDF preview -->
  <rect x="880" y="368" width="180" height="120" rx="10" fill="#f9fafb" stroke="#ede9fe" stroke-width="1.5"/>
  <!-- PDF header -->
  <rect x="880" y="368" width="180" height="28" rx="10" fill="url(#tealAcademy)"/>
  <text x="970" y="387" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">CLINICAL REPORT</text>
  <rect x="896" y="406" width="140" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="896" y="420" width="120" height="6" rx="3" fill="#f3f4f6"/>
  <rect x="896" y="432" width="130" height="6" rx="3" fill="#f3f4f6"/>
  <rect x="896" y="444" width="110" height="6" rx="3" fill="#f3f4f6"/>
  <!-- PDF badge -->
  <rect x="1000" y="466" width="40" height="16" rx="4" fill="#dc2626"/>
  <text x="1020" y="478" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">PDF</text>
  <text x="970" y="528" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Print-ready output</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="60" fill="white" stroke="#e5e7eb" stroke-width="0"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="614" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Trusted for clinical workflows. Secure. Fast. Professional.</text>

  <!-- Feature tags -->
  <rect x="308" y="628" width="120" height="26" rx="13" fill="#dbeafe"/>
  <text x="368" y="645" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">HIPAA Ready</text>
  <rect x="448" y="628" width="130" height="26" rx="13" fill="#d1fae5"/>
  <text x="513" y="645" font-family="Arial, sans-serif" font-size="11" fill="#065f46" text-anchor="middle">AI-Extracted</text>
  <rect x="598" y="628" width="130" height="26" rx="13" fill="#ede9fe"/>
  <text x="663" y="645" font-family="Arial, sans-serif" font-size="11" fill="#4c1d95" text-anchor="middle">Print-Ready PDF</text>
  <rect x="748" y="628" width="140" height="26" rx="13" fill="#fef3c7"/>
  <text x="818" y="645" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">Multi-format Input</text>

  <text x="600" y="725" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">vieroacademy.manus.space</text>
</svg>
