<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="darkNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>
    <linearGradient id="photoBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3040"/>
      <stop offset="100%" style="stop-color:#1e2535"/>
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f1923" stop-opacity="0.92"/>
      <stop offset="60%" style="stop-color:#0f1923" stop-opacity="0.75"/>
      <stop offset="100%" style="stop-color:#0f1923" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="vmLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="750" fill="url(#darkNavy)"/>

  <!-- Simulated meeting room photo background -->
  <rect x="0" y="72" width="1200" height="678" fill="url(#photoBase)"/>

  <!-- Table and people silhouettes (boardroom scene) -->
  <!-- Room background suggestion -->
  <rect x="0" y="72" width="1200" height="678" fill="#1e2a3a"/>
  <!-- Window/blinds suggestion on right -->
  <rect x="680" y="72" width="520" height="500" fill="#252f40"/>
  <rect x="700" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="730" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="760" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="790" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="820" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="850" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="880" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="910" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="940" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="970" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <rect x="1000" y="90" width="10" height="460" fill="#1a2535" opacity="0.5"/>
  <!-- Plant silhouette -->
  <ellipse cx="660" cy="200" rx="40" ry="60" fill="#1a2a1a" opacity="0.8"/>
  <rect x="655" y="250" width="10" height="100" fill="#141e14" opacity="0.7"/>

  <!-- Conference table suggestion -->
  <ellipse cx="800" cy="480" rx="320" ry="80" fill="#1a1510" opacity="0.7"/>

  <!-- People silhouettes around table -->
  <!-- Person 1 (left, standing/seated) -->
  <ellipse cx="580" cy="370" rx="28" ry="32" fill="#2a3244" opacity="0.9"/>
  <rect x="556" y="400" width="48" height="60" rx="10" fill="#22293a" opacity="0.9"/>
  <!-- Person 2 -->
  <ellipse cx="680" cy="350" rx="26" ry="30" fill="#303848" opacity="0.9"/>
  <rect x="658" y="378" width="44" height="65" rx="10" fill="#282f40" opacity="0.9"/>
  <!-- Person 3 (center, more prominent) -->
  <ellipse cx="780" cy="330" rx="30" ry="34" fill="#3a4255" opacity="0.9"/>
  <rect x="756" y="362" width="50" height="70" rx="10" fill="#303848" opacity="0.9"/>
  <!-- Person 4 -->
  <ellipse cx="890" cy="350" rx="26" ry="30" fill="#2e3648" opacity="0.9"/>
  <rect x="868" y="378" width="44" height="65" rx="10" fill="#262d3e" opacity="0.9"/>
  <!-- Person 5 -->
  <ellipse cx="990" cy="370" rx="28" ry="32" fill="#2a3244" opacity="0.9"/>
  <rect x="966" y="400" width="48" height="60" rx="10" fill="#22293a" opacity="0.9"/>
  <!-- Person 6 (right, turned) -->
  <ellipse cx="1080" cy="390" rx="26" ry="30" fill="#283040" opacity="0.9"/>
  <rect x="1058" y="418" width="44" height="55" rx="10" fill="#202838" opacity="0.9"/>

  <!-- Dark overlay for text readability -->
  <rect width="1200" height="750" fill="url(#overlayGrad)"/>
  <!-- Extra dark gradient from bottom -->
  <rect x="0" y="550" width="1200" height="200" fill="url(#darkNavy)" opacity="0.6"/>

  <!-- Nav bar -->
  <rect width="1200" height="64" fill="rgba(10,15,25,0.95)"/>
  <rect width="1200" height="1" y="64" fill="rgba(255,255,255,0.1)"/>

  <!-- VieroMind logo in nav -->
  <!-- Circle logo -->
  <circle cx="36" cy="32" r="16" fill="none" stroke="url(#vmLogoGrad)" stroke-width="2.5"/>
  <circle cx="36" cy="32" r="7" fill="none" stroke="url(#vmLogoGrad)" stroke-width="2"/>
  <circle cx="36" cy="32" r="3" fill="#3b82f6"/>
  <text x="60" y="29" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="white">VieroMind</text>
  <!-- Divider -->
  <line x1="166" y1="20" x2="166" y2="46" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="178" y="29" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="2">STRATEGIC ROUNDTABLE</text>

  <!-- Nav links -->
  <text x="560" y="37" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Purpose</text>
  <text x="652" y="37" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Attendees</text>
  <text x="754" y="37" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Pillars</text>
  <text x="830" y="37" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Platform</text>
  <text x="916" y="37" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Outcomes</text>

  <!-- View Agenda button -->
  <rect x="1048" y="18" width="130" height="34" rx="6" fill="url(#blueAccent)"/>
  <text x="1113" y="39" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">View Agenda</text>

  <!-- Hero content -->
  <!-- "STRATEGIC ROUNDTABLE - BY INVITATION ONLY" badge -->
  <line x1="80" y1="200" x2="114" y2="200" stroke="white" stroke-width="1.5"/>
  <text x="124" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#60a5fa" letter-spacing="2">STRATEGIC ROUNDTABLE · BY INVITATION ONLY</text>

  <!-- Main headline -->
  <text x="80" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="white">VieroMind</text>
  <text x="80" y="334" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">
    <tspan fill="#60a5fa">Mental Health</tspan>
  </text>
  <text x="80" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="white">Roundtable: <tspan fill="#60a5fa">Pakistan</tspan></text>

  <!-- Description -->
  <text x="80" y="448" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.75)">Defining a standardized, scalable mental health system for Pakistan's</text>
  <text x="80" y="470" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.75)">240 million citizens. A closed convening of clinicians, policymakers,</text>
  <text x="80" y="492" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.75)">technologists, and educators.</text>

  <!-- Info tags -->
  <rect x="80" y="514" width="160" height="32" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="160" y="534" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">📍 Lahore, Pakistan</text>

  <rect x="254" y="514" width="90" height="32" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="299" y="534" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">📅 2026</text>

  <rect x="358" y="514" width="150" height="32" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="433" y="534" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">🔒 By Invitation Only</text>

  <!-- CTA Buttons -->
  <rect x="80" y="566" width="200" height="50" rx="8" fill="url(#blueAccent)"/>
  <text x="180" y="596" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">View Agenda →</text>

  <rect x="296" y="566" width="160" height="50" rx="8" fill="transparent" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="376" y="596" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)" text-anchor="middle">Our Purpose</text>

  <!-- Powered by footer -->
  <rect x="0" y="680" width="1200" height="70" fill="rgba(10,15,25,0.9)"/>
  <line x1="0" y1="680" x2="1200" y2="680" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="720" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">POWERED BY</text>
  <!-- VM logo small -->
  <circle cx="190" cy="715" r="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="190" cy="715" r="4" fill="#3b82f6" opacity="0.5"/>
  <text x="206" y="720" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">VieroMind</text>
  <text x="300" y="720" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">+</text>
  <text x="318" y="720" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Viero Academy</text>
</svg>
